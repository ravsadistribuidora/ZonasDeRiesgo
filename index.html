<!doctype html><html lang=es><head><meta charset=utf8>
<meta name=viewport content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name=theme-color content="#1A1F2B">
<title>Zonas de Riesgo 2026 — Mapa interactivo</title>
<link rel=stylesheet href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root{--bar:56px;--side:380px;--peek:158px;--sab:env(safe-area-inset-bottom,0px);--sat:env(safe-area-inset-top,0px)}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{margin:0;height:100%;font-family:'Segoe UI',system-ui,-apple-system,Arial,sans-serif;background:#0e1117;overscroll-behavior:none}
body{height:100vh;height:100dvh}
#bar{position:fixed;top:0;left:0;right:0;min-height:var(--bar);padding:calc(var(--sat) + 0px) 14px 0;background:#1A1F2B;color:#fff;display:flex;align-items:center;gap:10px;z-index:1200;box-shadow:0 2px 8px rgba(0,0,0,.4);overflow-x:auto;white-space:nowrap;scrollbar-width:none}
#bar::-webkit-scrollbar{display:none}
#bar b{font-size:16px;flex:none}
.sub{margin-left:auto;font-size:12px;color:#9aa3b2;flex:none}
.tab{background:#2c3446;color:#cfd6e2;border:none;padding:9px 15px;border-radius:8px;font-size:14px;cursor:pointer;font-weight:600;transition:.15s;flex:none;min-height:38px}
.tab:active{transform:scale(.96)}
.tab.on{background:#D7263D;color:#fff}
#map{position:fixed;top:var(--bar);bottom:0;left:0;right:var(--side);background:#11151d}
#side{position:fixed;top:var(--bar);bottom:0;right:0;width:var(--side);background:#11151d;color:#e7ecf3;display:flex;flex-direction:column;border-left:1px solid #232a37;z-index:1100}
.grip{display:none}
#peekbar{display:none}
#nav{display:flex;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid #232a37;background:#161b25;flex:none}
#nav button{background:#222a38;color:#fff;border:none;width:46px;height:46px;border-radius:12px;font-size:24px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.12s;line-height:1}
#nav button:active{background:#D7263D;transform:scale(.93)}
#counter{font-size:13px;color:#9aa6b6;flex:1;text-align:center}
#counter b{color:#fff;font-size:16px}
#card{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:18px 18px calc(26px + var(--sab))}
.chead{display:flex;align-items:flex-start;gap:10px;margin-bottom:4px}
.dot{width:16px;height:16px;border-radius:50%;flex:none;margin-top:4px;border:2px solid #fff;box-shadow:0 0 3px #000}
.cname{font-size:20px;font-weight:700;line-height:1.2}
.ccode{font-size:12px;color:#8d99ab;margin-bottom:12px}
.zbadge{display:inline-block;padding:5px 13px;border-radius:20px;color:#fff;font-size:12px;font-weight:700;margin-bottom:14px}
.row{display:flex;gap:8px;font-size:14px;margin:7px 0;align-items:flex-start}
.row .k{color:#8d99ab;min-width:92px;flex:none}
.row .v{color:#eef2f7;font-weight:600}
.sec{margin-top:16px;border-top:1px solid #1e2632;padding-top:14px}
.sec h4{margin:0 0 9px;font-size:12px;letter-spacing:1.1px;text-transform:uppercase;color:#7e8aa0}
.chips{display:flex;flex-wrap:wrap;gap:7px}
.chip{font-size:12.5px;padding:6px 11px;border-radius:8px;font-weight:600}
.chip.r{background:#3a1116;color:#ff9aa6;border:1px solid #5b1a22}
.chip.a{background:#332915;color:#ffcf8a;border:1px solid #5a4720}
.chip.ok{background:#15301c;color:#8fe6a6;border:1px solid #235235}
.chip.neu{background:#1c2330;color:#c4cfe0;border:1px solid #2c3647}
.none{color:#6c7689;font-style:italic;font-size:13px}
.legend{background:rgba(255,255,255,.96);padding:8px 11px;border-radius:8px;box-shadow:0 1px 6px rgba(0,0,0,.35);font-size:12px;line-height:1.6;color:#222}
.legend i{width:12px;height:12px;border-radius:50%;display:inline-block;margin-right:6px;border:2px solid #fff;box-shadow:0 0 2px #888;vertical-align:-2px}
.lbl{font-weight:700;font-size:10px;color:#fff;text-align:center;text-shadow:0 0 2px #000,0 0 2px #000,0 0 2px #000}
.leaflet-popup-content{font-size:13px;font-weight:600}
.hint{font-size:11px;color:#6c7689;text-align:center;padding:0 16px calc(10px + var(--sab))}
/* ---------- Hamburguesa + Drawer ---------- */
#hamb{display:none;background:#2c3446;color:#fff;border:none;width:40px;height:40px;border-radius:8px;font-size:21px;line-height:1;cursor:pointer;flex:none;align-items:center;justify-content:center}
#nav #closecard{display:none}
#hamb:active{transform:scale(.93)}
#drawerov{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1490;opacity:0;pointer-events:none;transition:opacity .25s}
#drawerov.show{opacity:1;pointer-events:auto}
#drawer{position:fixed;top:0;left:0;bottom:0;width:86%;max-width:340px;background:#11151d;color:#e7ecf3;z-index:1500;transform:translateX(-101%);transition:transform .28s cubic-bezier(.22,.61,.36,1);display:flex;flex-direction:column;box-shadow:2px 0 18px rgba(0,0,0,.55)}
#drawer.show{transform:translateX(0)}
.dhead{display:flex;align-items:center;gap:10px;padding:calc(var(--sat) + 14px) 14px 12px;border-bottom:1px solid #232a37;background:#161b25;flex:none}
.dhead b{font-size:16px;flex:1}
#drawerclose{background:#222a38;color:#fff;border:none;width:36px;height:36px;border-radius:9px;font-size:17px;cursor:pointer}
.dsec{padding:13px 14px 5px;font-size:11px;letter-spacing:1px;text-transform:uppercase;color:#7e8aa0;font-weight:700}
.loclist{display:flex;flex-wrap:wrap;gap:8px;padding:2px 14px 10px}
.locbtn{background:#222a38;color:#cfd6e2;border:none;padding:10px 14px;border-radius:9px;font-size:14px;font-weight:600;cursor:pointer;flex:1;min-width:92px;transition:.12s}
.locbtn:active{transform:scale(.96)}
.locbtn.on{background:#D7263D;color:#fff}
.psearch{padding:0 14px 8px;display:flex}
.psearch input{flex:1;background:#1a2130;border:1px solid #2a3343;color:#e7ecf3;border-radius:9px;padding:10px 12px;font-size:14px;outline:none}
.psearch input::placeholder{color:#6c7689}
#ptlist{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;border-top:1px solid #1b222e;padding-bottom:calc(10px + var(--sab))}
.ptitem{display:flex;align-items:center;gap:10px;padding:11px 14px;border-bottom:1px solid #161c27;cursor:pointer}
.ptitem:active{background:#1a2230}
.ptitem.on{background:#1e2a3a}
.ptitem .dot{width:14px;height:14px;border-radius:50%;border:2px solid #fff;flex:none;box-shadow:0 0 2px #000;margin:0}
.ptitem .pi{flex:1;min-width:0}
.ptitem .pin{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.25}
.ptitem .pic{font-size:11px;color:#8d99ab;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ptitem .piz{font-size:9.5px;font-weight:700;color:#fff;padding:3px 7px;border-radius:10px;flex:none;max-width:84px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* ---------- MÓVIL ---------- */
@media(max-width:760px){
 :root{--side:0px}
 #hamb{display:flex}
 #bar .tab{display:none}
 #bar b{font-size:15px}
 .sub{display:none}
 #map{right:0;top:var(--bar);bottom:0;transition:bottom .3s cubic-bezier(.22,.61,.36,1)}
 #side{left:0;right:0;width:auto;top:auto;height:46vh;height:46dvh;border-left:none;border-top:1px solid #2a3340;
   border-radius:16px 16px 0 0;box-shadow:0 -6px 22px rgba(0,0,0,.5);
   transform:translateY(100%);transition:transform .3s cubic-bezier(.22,.61,.36,1)}
 body.sheet #map{bottom:46vh;bottom:46dvh}
 body.sheet #side{transform:translateY(0)}
 #nav #closecard{display:flex;margin-left:4px;background:#2a2030;color:#ff9aa6}
 #nav #closecard:active{background:#D7263D;color:#fff}
 .grip,#peekbar,.hint{display:none}
 #nav{border-top:none}
 .leaflet-control-zoom{margin-bottom:10px!important;transition:margin-bottom .3s}
 body.sheet .leaflet-control-zoom{margin-bottom:calc(46dvh + 10px)!important}
 body.sheet .legend{display:none}
}
</style></head><body>

</div>

 if(markers[i]&&markers[i].bringToFront){selRing.bringToFront();markers[i].bringToFront();}
 if(fly){
   if(isMobile())map.flyTo(document.body.classList.contains('sheet')?offCenter(p.lat,p.lng,16):[p.lat,p.lng],16,{duration:.6});
   else map.flyTo([p.lat,p.lng],16,{duration:.7});
 }
 buildPtList();
}
function step(d){var n=DATA[curLoc].length;select((cur+d+n)%n,true)}
function show(loc){
 curLoc=loc;cur=0;
 ['CONCORDIA','FEDERACION','FELICIANO','FEDERAL'].forEach(function(k){document.getElementById('t_'+k).className='tab'+(k===loc?' on':'');var dl=document.getElementById('dl_'+k);if(dl)dl.className='locbtn'+(k===loc?' on':'')});
 layer.clearLayers();markers=[];var g=[];selRing.setStyle({opacity:0});
 DATA[loc].forEach(function(p,i){
  var m=L.circleMarker([p.lat,p.lng],{radius:8,color:'#fff',weight:2,fillColor:p.c,fillOpacity:1}).addTo(layer);
  m.on('click',function(){select(i,false);if(isMobile())setSheet(true);else map.panTo([p.lat,p.lng],{animate:true})});
  markers.push(m);
  L.marker([p.lat,p.lng],{icon:L.divIcon({className:'lbl',html:p.n,iconSize:[26,12]}),interactive:false}).addTo(layer);
  g.push([p.lat,p.lng]);
 });
 if(g.length===1){map.setView(g[0],15)}else{map.fitBounds(g,{padding:[55,55]})}
 if(legend)map.removeControl(legend);
 legend=L.control({position:'bottomleft'});
 legend.onAdd=function(){var dv=L.DomUtil.create('div','legend');var hh='<b>Tipo de zona</b><br>';
  PRESENT[loc].forEach(function(z){hh+='<i style="background:'+colorFor(z)+'"></i>'+z+'<br>'});dv.innerHTML=hh;return dv};
 legend.addTo(map);
 renderCard(0);buildPtList();
 if(isMobile())setSheet(false);
}
/* ---- drawer / menú hamburguesa (móvil) ---- */
function openDrawer(){document.getElementById('drawer').classList.add('show');document.getElementById('drawerov').classList.add('show');buildPtList();}
function closeDrawer(){document.getElementById('drawer').classList.remove('show');document.getElementById('drawerov').classList.remove('show');}
function pickPt(i){closeDrawer();select(i,true);if(isMobile())setSheet(true);}
function buildPtList(){
 var arr=DATA[curLoc],q=(document.getElementById('ptsearch').value||'').trim().toLowerCase(),html='';
 arr.forEach(function(p,i){
  if(q){var hay=(p.nom+' '+p.n+' '+(p.dom||'')).toLowerCase();if(hay.indexOf(q)<0)return;}
  html+='<div class="ptitem'+(i==cur?' on':'')+'" onclick="pickPt('+i+')">'
   +'<span class=dot style="background:'+p.c+'"></span>'
   +'<div class=pi><div class=pin>'+esc(p.nom)+'</div><div class=pic>#'+p.n+' · '+esc(p.dom)+'</div></div>'
   +'<span class=piz style="background:'+p.c+'">'+esc(p.z)+'</span></div>';
 });
 document.getElementById('ptlist').innerHTML=html||'<div class=none style="padding:16px 14px">Sin resultados</div>';
}
/* ---- tarjeta dinámica (móvil): la pantalla se divide sólo al elegir un punto ---- */
function offCenter(lat,lng,z){var pt=map.project([lat,lng],z);pt.y+=map.getSize().y*0.23;return map.unproject(pt,z);}
function centerCur(){var p=DATA[curLoc][cur];if(!p||!isMobile())return;map.panTo(offCenter(p.lat,p.lng,map.getZoom()),{animate:true});}
function setSheet(open){
 var wasOpen=document.body.classList.contains('sheet');
 document.body.classList.toggle('sheet',open);
 if(open&&wasOpen)centerCur();
 setTimeout(function(){map.invalidateSize()},70);
 setTimeout(function(){map.invalidateSize();if(open&&!wasOpen)centerCur()},360);
}
document.addEventListener('keydown',function(e){if(e.key=='ArrowRight')step(1);if(e.key=='ArrowLeft')step(-1)});
window.addEventListener('resize',function(){setTimeout(function(){map.invalidateSize()},200)});
show('CONCORDIA');
setTimeout(function(){map.invalidateSize()},400);
</script></body></html>
